{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="account-wrapper margin-response">

    <div class="form-box text-center">

        <h2 class="mb-4 text-gld">{% trans "Sign Out" %}</h2>

        <p class="text-gld mb-4">
            {% trans "Are you sure you want to sign out?" %}
        </p>

        <form method="post" action="{% url 'account_logout' %}">
            {% csrf_token %}

            {% if redirect_field_value %}
                <input type="hidden"
                       name="{{ redirect_field_name }}"
                       value="{{ redirect_field_value }}">
            {% endif %}

            <div class="d-flex justify-content-center gap-3">
                <a class="btn btn-outline-black rounded-0"
                   href="{% url 'home' %}">
                    Cancel
                </a>

                <button type="submit"
                        class="btn btn-black rounded-0">
                    Sign Out
                </button>
            </div>
        </form>

    </div>

</div>
{% endblock %}
